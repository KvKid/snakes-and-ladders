<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snakes & Ladders</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Setup Screen -->
  <div id="setup-screen" class="screen active">
    <div class="setup-card">
      <h1>Snakes &amp; Ladders</h1>
      <label>How many players?</label>
      <div class="player-count-btns">
        <button class="count-btn active" data-count="1">1</button>
        <button class="count-btn" data-count="2">2</button>
        <button class="count-btn" data-count="3">3</button>
        <button class="count-btn" data-count="4">4</button>
      </div>
      <div id="name-inputs"></div>
      <button id="start-btn">Start Game</button>
      <div id="leaderboard-section">
        <h3 class="lb-title">Best Scores</h3>
        <div id="leaderboard"></div>
      </div>
    </div>
  </div>

  <!-- Game Screen -->
  <div id="game-screen" class="screen">
    <div id="game-layout">
      <div id="board-wrapper">
        <div id="board"></div>
        <!-- SVG overlay for snake/ladder connections -->
        <svg id="overlay" xmlns="http://www.w3.org/2000/svg" width="560" height="560">
          <defs>
            <marker id="snake-arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
              <path d="M0,0 L0,6 L8,3 z" fill="#e94560"/>
            </marker>
            <marker id="ladder-arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
              <path d="M0,0 L0,6 L8,3 z" fill="#69f0ae"/>
            </marker>
          </defs>
        </svg>
        <!-- Tokens -->
        <div class="token" id="token-0"></div>
        <div class="token" id="token-1"></div>
        <div class="token" id="token-2"></div>
        <div class="token" id="token-3"></div>
      </div>
      <div id="panel">
        <div id="player-roster"></div>
        <div id="turn-indicator"></div>
        <button id="roll-btn">Roll Dice</button>
        <div id="roll-hint"><kbd>Space</kbd> or click to roll</div>
        <div id="dice-result" class="placeholder">🎲</div>
        <div id="log-title">Move Log</div>
        <ul id="move-log"></ul>
      </div>
    </div>
  </div>

  <!-- Confetti (drawn on win) -->
  <canvas id="confetti" class="hidden"></canvas>

  <!-- Win Overlay -->
  <div id="win-overlay" class="hidden">
    <div id="win-card">
      <div id="win-title"></div>
      <table id="summary-table">
        <thead><tr><th>Player</th><th>Turns</th></tr></thead>
        <tbody id="summary-body"></tbody>
      </table>
      <button onclick="location.reload()">Play Again</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
